    totally not in the scope; good for having a brief big picture of current LLM agent development"
- title: "Agent Harness for Large Language Model Agents: A Survey"
  date: 2026.04.09
  summary: "proposed 6 components for harness structure: E—Executionloop, T—Toolregistry, C—Contextmanager, S—Statestore, L—Lifecyclehooks, V—Evaluationinterface 
    analyzed structural necessity and failure modes of these components 
    good to have a measurable decomposition and definition of harness 
    history of harness: prompt engineering (-2024) -> context management (2024-2025) -> agent harness (2025-) 
    good examples elaborated (e.g. codex) 
    idea of meta-harness: search the space: What harness design, discovered through agentic search, enables this agent to perform optimally?"
- title: "Perturbation analysis: A framework for data-driven control and optimization of discrete event and hybrid systems"
  date: 2018.04.13
  summary: "infinitesimal perturbation analysis survey. very cybernetics grounded and provided a brief timeline of how the differentials evolve 
    over the course of time in terms of the cybernetics. 
    useful to show the relationship that the current differentiable simulation, discrete random sampling/branching modeling are continuations 
    or circumvents of IPA which is a very large branch in cybernetics"
- title: "A review of automatic differentiation and its efficient implementation"
  date: 2018.02.23
  summary: "well known AD literature review, covers typical AD, checkpointing, supernode, retaping, and other computational and mathematical tricks; 
    but this is too old"

