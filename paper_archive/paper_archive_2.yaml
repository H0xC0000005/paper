Autodiff:
- title: "You Only Linearize Once Tangents Transpose to Gradients"
  date: 2022.12.06
  summary: "very innovative paper: assert that forward and backward pass can be unified via linearization; the backward pass is the transpose of 
    the linearized tangent path (instead of non-linear primal) of the forward pass; proved that AD is structurally linear for the selected set 
    of operations; prone to extension of operations"
- title: "Efficient and Modular Implicit Differentiation"
  date: 2022.10.21
  summary: "propose implicit AD method; the core idea is to implicitly differentiate f(x(theta), g(theta)) without differentiating the possible non-smooth, non-convex component g();
    the formulation is especially useful for ML where proximal grad fix points are often the form of op target"
- title: "Do Differentiable Simulators Give Better Policy Gradients?"
  date: 2022.08.22
  summary: "interesting paper, study whether first order gradient (simulator gradient) is better than the zero order gradient (policy gradient)
    core conclusion: FoBG (batched gradient) has low variance but structural bias (related to discontinuity, that is also asserted in discrete random process handling),
    and ZoBG can be theoretically unbiased (and often the case) but high variance.
    however FoBG sometimes also produce high variance when discontinuities and jumps comes into play, and ZoBG is better in such cases 
    propose an initial method to dynamically mix FoBG and ZoBG to inherit advantages of both"
- title: "A taxonomy of automatic differentiation pitfalls"
  date: 2024.07.08
  summary: "interesting survey, list the common AD failures but mainly focus on implementation pitfalls and suggestions to bridge the implementation gap.
    does not count mathematical bad formulation like what discrete random process differentiable modeling usually do"
- title: "Conservative set valued fields, automatic differentiation, stochastic gradient methods and deep learning"
  date: 2020.04.09
  summary: very important paper, propose conservative field (for scalar) and map (for vector) to reformulate the AD process, that is conservative (integral is 
    the diff of potential, thus not dependent on path over kinks and discontinuities), can be chained (especially for DL), can reconstruct the original target 
    (the integral and derivative is two-way), can give exact set of Aumann inteegration). thus it does not require exact convexity and can tolerate branches
- title: "Automatic Differentiation of Optimization Algorithms with Time-Varying Updates"
  date: 2024.10.24
  summary: "recent paper studying the effect of varying timestep. core challenge: traditional iterative optimization use fixed update map (static scenario), 
    and varying timestep can change this; core method: treat AD as error recurrence to x^*; requires contractive around the final convergence and 
    same fixed point, and thus evaluating the derivative in the final region is equivalent to evaluating that on the optimal solution, 
    the effect of varying timestep is not decisive in this case; 
    from a side reveals why my project fails for sparse grad since backward target is changed, breaks the required property"
- title: 'The Curse of Unrolling: Rate of Differentiating Through Optimization'
  date: 2023.08.25
  summary: "an initial work on the distinction between primal optimization target and the gradient convergence (jacobian). for quadratic target, there is 
    an outer exponentially decay gain and inner linearly increase term, and the linear term can introduce an initial burn-in period for jacobian; 
    lesson: good primal convergence can with bad jacobian direction; derivative usefulness itself is not fully dependent 
    on the primal convergence;
    tested only on quadratic target, and propose quadratic-only optimizer (sobolev and chebyshev) but the core idea may generalize on my project"
- title: "Automatic differentiation of nonsmooth iterative algorithms"
  date: 2022.06.02
  summary: "early work of implicit differentiation on bi-level optimization problem. tackes non-smooth horizon, also assumes contractive fixed point neighborhood, 
    and cannot deal with non-continuous functions generally; or can deal with kinks (even if kink position moves with theta) generally but cannot deal with jumps 
    use set-valued piggyback recursion and contractive assumption to handle derivative discontinuities; and propose an initial linear convergence bound 
    for ITD (iterative differentiation, compared to AID approx implicit diff);
    also propose a simple example to prove that the formulation can diverge; consistent observation: primal convergence path does not imply 
    gradient quality by default
    the core culprit of non-smooth should be there can be no single jacobian for some steps with piggyback backprop"
- title: "Nonsmooth Implicit Differentiation: Deterministic and Stochastic Convergence Rates"
  date: 2026.06.04
  summary: "subsequent work from Automatic differentiation of nonsmooth iterative algorithms. Different from that, propose AID instead of ITD, 
    propose AID-FP: fix the fixed-point state, solve the derivative problem there;
    NSID: tackles stochastic process by estimating an implicit and conservative JVP; 
    prove a better bound than the previous work"


misc or utility:
- title: "Categorical Reparameterization with Gumbel-Softmax"
  date: 2017.08.05
  summary: "gumbel softmax. use reparameterization trick to move the stochastic node out of the gradient path; 
    also reviewed score function estimator (REINFORCE) and straight through estimator (biased)"
- title: "Estimating or Propagating Gradients Through Stochastic Neurons for Conditional Computation"
  date: 2013.08.15
  summary: "original paper of straight through estimator (biased); also contain unbiased gradient estimator for stochastic neurons"
- title: "Smoothing Methods for Automatic Differentiation Across Conditional Branches"
  date: 2023.12.13
  summary: "paper of smooth interpretation and discograd; SI is to use gaussian kernel to smooth branching condition by using CDF to 
    represent condition; discograd uses monte carlo method to estimate the distribution of arbitrary branches;
    experiments show that SI can produce small gradients and low recall, while discograd need to estimate the branching distribution 
    and have bias & local noise"
- title: "Automatic Gradient Estimation for Calibrating Crowd Models with Discrete Decision Making"
  summary: "continuation of discograd (by same authors); not much novelty, mainly experiment paper"
- title: "Automatic Differentiation of Programs with Discrete Randomness"
  date: 2023.01.09
  summary: "stochasticAD. use reparameterization trick to introduce decision boundary modeling over discrete random sampling; 
    the method is analytic and unbiased but have no way to address branching mass distribution of arbitrary branching 
    correction: its probability reparameterization do represent the branching mass. 
    its limitation is mainly native forward mode and no guarantee on bias/variance"
- title: "Systematically Differentiating Parametric Discontinuities"
  date: 2021.07.19
  summary: "Teg paper. propose the language 'teg' to handle discrete boundary problem in the integration, which is common in CV, 
    rendering, physics, etc. explicitly models dirac delta and use reparameterization trick to cancel the effect of delta 
    to perform the integration of a function of parameters"
- title: "Distributions for Compositionally Differentiating Parametric Discontinuities"
  date: 2024.04.29
  summary: "potto paper, following up work by the same group"
- title: "ADEV: Sound Automatic Differentiation of Expected Values of Probabilistic Programs"
  note: "not read; it is very theory-heavy, used gpt to generate summary"
  summary: "Do not differentiate one sampled execution path as if randomness were fixed.
    Instead, transform the probabilistic program into a new estimator program whose expectation equals the derivative of 
    the original program's expectation."
- title: "A New Unbiased Stochastic Derivative Estimator for Discontinuous Sample Performances with Structural Parameters"
  date: 2018.02.03
  summary: "a highly cited pivot IPA+LR (likelihood ratio, or score function) paper; very cybernetics backgrounded; proposed
    concrete derivations of derivative target and explicitly model both pathwise and moving branching mass terms; 
    yet can only apply if the task analytically allows this (as early stage limitation)"

